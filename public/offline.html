<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - Pulse NYC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8fafb;
      color: #1e2d2a;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 420px;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      background: rgba(45, 212, 160, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg {
      width: 32px;
      height: 32px;
      color: #2dd4a0;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #1e2d2a 20%, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #5a7a6e;
      font-size: 0.938rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .retry-btn {
      display: inline-block;
      padding: 0.625rem 1.5rem;
      border: 1px solid #e2e8e4;
      border-radius: 9999px;
      background: #ffffff;
      color: #1e2d2a;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      text-decoration: none;
    }
    .retry-btn:hover {
      border-color: #2dd4a0;
      box-shadow: 0 0 0 3px rgba(45, 212, 160, 0.1);
    }
    .brand {
      margin-top: 2.5rem;
      font-size: 0.6875rem;
      color: #8ba89c;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon" style="background: linear-gradient(135deg, #4A7C59, #6B9E7A);">
      <svg xmlns="http://www.w3.org/2000/svg" fill="white" viewBox="0 0 18 18" style="width:32px;height:32px;">
        <path d="M9 15.3C8.4 14.7 2 10.2 2 6.5 2 4.2 3.8 2.5 5.8 2.5c1.2 0 2.3.6 3.2 1.7.9-1.1 2-1.7 3.2-1.7 2 0 3.8 1.7 3.8 4 0 3.7-6.4 8.2-7 8.8z" opacity="0.95"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Pulse NYC will reload automatically when your connection is restored. Cached pages may still be available.</p>
    <button class="retry-btn" onclick="window.location.reload()">Try again</button>
    <div class="brand">Pulse NYC &middot; pulsenyc.app</div>
  </div>
</body>
</html>
