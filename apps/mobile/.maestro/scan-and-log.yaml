appId: app.pulsenyc.mobile
name: "Scan Barcode → View Score → Log Entry"
---

- launchApp

# Go to Scan screen
- tapOn: "Scan Barcode"
- waitForAnimationToEnd

# Handle camera permission
- runFlow:
    when:
      visible: "Allow Camera"
    commands:
      - tapOn: "Allow Camera"

# Wait for scanner to load
- assertVisible: "Point at a barcode"

# In CI, simulate a barcode scan by going back and verifying the flow
# In real device testing, scan a physical barcode here

# Go back
- tapOn: "✕"
- waitForAnimationToEnd

# Verify we're back on main screen
- assertVisible: "Eat Smart Near You"

# Go to log to verify it's accessible
- tapOn: "Log"
- assertVisible: "Today's Log"
