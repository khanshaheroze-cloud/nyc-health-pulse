name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # Public token only used client-side; tests degrade gracefully without it
      NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm run build

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Data validation + unit tests (no server needed)
        run: pnpm exec playwright test tests/curated-picks.spec.ts tests/venue-normalize.spec.ts --project=chromium

      - name: E2E regression suite
        run: pnpm exec playwright test --project=chromium --project=mobile
        env:
          CI: "true"

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
